<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golf Tournament Calendar 2026</title>
  <style>
    :root {
      --bg: #0e1a14;
      --surface: #162219;
      --surface2: #1d2e22;
      --border: #2a3d2f;
      --text: #e8f0ea;
      --muted: #7a9980;
      --accent: #4caf6e;

      --tier-s-bg: #2a1f05;
      --tier-s-border: #c9901a;
      --tier-s-text: #f5c842;
      --tier-s-dot: #f5c842;

      --tier-a-bg: #0d1e2e;
      --tier-a-border: #1e6fa8;
      --tier-a-text: #6bb8e8;
      --tier-a-dot: #5aabdf;

      --tier-b-bg: #0d2218;
      --tier-b-border: #2a7a50;
      --tier-b-text: #5cc98a;
      --tier-b-dot: #4db87a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    h1 span { color: var(--accent); }

    .last-updated {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .filters {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    select, .view-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }
    select:hover, .view-btn:hover { border-color: var(--accent); }

    .view-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .view-btn {
      border: none;
      border-radius: 0;
      padding: 7px 14px;
      font-size: 12px;
    }
    .view-btn.active {
      background: var(--accent);
      color: #fff;
    }

    /* TIER LEGEND */
    .tier-legend {
      display: flex;
      gap: 16px;
      padding: 12px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .tier-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
    }

    .tier-pill {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .tier-S { background: var(--tier-s-bg); border: 1px solid var(--tier-s-border); color: var(--tier-s-text); }
    .tier-A { background: var(--tier-a-bg); border: 1px solid var(--tier-a-border); color: var(--tier-a-text); }
    .tier-B { background: var(--tier-b-bg); border: 1px solid var(--tier-b-border); color: var(--tier-b-text); }

    .tier-legend .tier-desc { color: var(--muted); font-size: 12px; }

    /* MAIN CONTENT */
    main {
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* CALENDAR VIEW */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .month-nav h2 {
      font-size: 22px;
      font-weight: 700;
    }

    .nav-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.15s;
    }
    .nav-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .day-header {
      background: var(--surface2);
      text-align: center;
      padding: 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .day-cell {
      background: var(--surface);
      height: 140px;
      overflow-y: auto;
      padding: 8px;
      position: relative;
    }

    .day-cell.empty { background: var(--bg); }
    .day-cell.today .day-num { background: var(--accent); color: #fff; }
    .day-cell.other-month { opacity: 0.4; }

    .day-num {
      font-size: 13px;
      font-weight: 600;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      margin-bottom: 4px;
      color: var(--muted);
    }

    .event-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 7px;
      border-radius: 5px;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 3px;
      transition: opacity 0.15s;
      white-space: normal;
      max-width: 100%;
    }
    .event-pill:hover { opacity: 0.8; }

    .event-pill.tier-S { background: var(--tier-s-bg); border: 1px solid var(--tier-s-border); color: var(--tier-s-text); }
    .event-pill.tier-A { background: var(--tier-a-bg); border: 1px solid var(--tier-a-border); color: var(--tier-a-text); }
    .event-pill.tier-B { background: var(--tier-b-bg); border: 1px solid var(--tier-b-border); color: var(--tier-b-text); }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tier-S .dot { background: var(--tier-s-dot); }
    .tier-A .dot { background: var(--tier-a-dot); }
    .tier-B .dot { background: var(--tier-b-dot); }

    .more-events {
      font-size: 10px;
      color: var(--muted);
      cursor: pointer;
      padding: 2px 4px;
    }
    .more-events:hover { color: var(--accent); }

    /* LIST VIEW */
    .list-view { display: none; }
    .list-view.active { display: block; }
    .calendar-view.hidden { display: none; }

    .list-month-group { margin-bottom: 32px; }
    .list-month-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .list-event-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .list-event-card:hover { border-color: var(--accent); background: var(--surface2); }

    .list-date-block {
      text-align: center;
      min-width: 48px;
      flex-shrink: 0;
    }
    .list-date-day {
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
      color: var(--accent);
    }
    .list-date-month {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .list-event-info { flex: 1; }
    .list-event-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .list-event-meta {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .list-event-meta span { display: flex; align-items: center; gap: 4px; }

    .list-tier { flex-shrink: 0; }

    /* STATS BAR */
    .stats-bar {
      display: flex;
      gap: 20px;
      padding: 16px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .stat {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .stat-num {
      font-size: 22px;
      font-weight: 800;
    }
    .stat-label {
      font-size: 12px;
      color: var(--muted);
    }
    .stat-s .stat-num { color: var(--tier-s-text); }
    .stat-a .stat-num { color: var(--tier-a-text); }
    .stat-b .stat-num { color: var(--tier-b-dot); }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      max-width: 560px;
      width: 100%;
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .modal-close:hover { background: #c0392b; border-color: #c0392b; color: #fff; }

    .modal-tier { margin-bottom: 12px; }
    .modal-name {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 6px;
      line-height: 1.2;
    }
    .modal-venue {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .modal-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .modal-detail {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .modal-detail-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 3px;
    }
    .modal-detail-value {
      font-size: 13px;
      font-weight: 600;
    }

    .modal-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .modal-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    .btn-rsvp {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.15s;
    }
    .btn-rsvp:hover { opacity: 0.85; }
    .btn-rsvp.disabled { background: var(--surface2); color: var(--muted); cursor: default; }

    .btn-source {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }
    .btn-source:hover { border-color: var(--accent); color: var(--accent); }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 18px; margin-bottom: 6px; color: var(--text); }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      header { padding: 12px 16px; }
      main { padding: 16px; }
      .day-cell { min-height: 80px; padding: 4px; }
      .event-pill { font-size: 8px; padding: 2px 4px; }
      .modal-details { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <div class="logo">⛳</div>
    <div>
      <h1>Golf Tournament <span>Calendar</span></h1>
      <div class="last-updated" id="lastUpdated">Loading...</div>
    </div>
  </div>
  <div class="filters">
    <select id="stateFilter">
      <option value="all">All States</option>
      <option value="CA">California</option>
      <option value="TX">Texas</option>
      <option value="OK">Oklahoma</option>
      <option value="GA">Georgia</option>
      <option value="FL">Florida</option>
      <option value="SC">South Carolina</option>
      <option value="WI">Wisconsin</option>
      <option value="MO">Missouri</option>
      <option value="MN">Minnesota</option>
      <option value="NE">Nebraska</option>
      <option value="RI">Rhode Island</option>
      <option value="UT">Utah</option>
      <option value="OR">Oregon</option>
      <option value="AL">Alabama</option>
    </select>
    <select id="tierFilter">
      <option value="all">All Tiers</option>
      <option value="S">Tier S – Elite</option>
      <option value="A">Tier A – Premium</option>
      <option value="B">Tier B – Community</option>
    </select>
    <div class="view-toggle">
      <button class="view-btn active" id="calBtn" onclick="setView('calendar')">📅 Calendar</button>
      <button class="view-btn" id="listBtn" onclick="setView('list')">☰ List</button>
    </div>
  </div>
</header>

<!-- TIER LEGEND + STATS -->
<div class="tier-legend">
  <div class="tier-badge">
    <span class="tier-pill tier-S">TIER S</span>
    <span class="tier-desc">Elite – Celebrity-hosted, exclusive invitationals & pro-ams (playable access)</span>
  </div>
  <div class="tier-badge">
    <span class="tier-pill tier-A">TIER A</span>
    <span class="tier-desc">Premium – Established charity events at private/premier clubs</span>
  </div>
  <div class="tier-badge">
    <span class="tier-pill tier-B">TIER B</span>
    <span class="tier-desc">Community – Open public charity events and local tournaments</span>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<!-- MAIN -->
<main>

  <!-- CALENDAR VIEW -->
  <div class="calendar-view" id="calendarView">
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">← Prev</button>
      <h2 id="monthTitle"></h2>
      <button class="nav-btn" onclick="changeMonth(1)">Next →</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
  </div>

  <!-- LIST VIEW -->
  <div class="list-view" id="listView">
    <div id="listContent"></div>
  </div>

</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
  // ─────────────────────────────────────────────
  // DATA
  // ─────────────────────────────────────────────
  let tournaments = [];
  let currentView = 'calendar';
  let currentYear = 2026;
  let currentMonth = new Date().getMonth(); // 0-indexed

  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  // Load from API (Render), fallback to inline data
  async function loadData() {
    try {
      const res = await fetch('/api/tournaments');
      if (!res.ok) throw new Error('API failed');
      const data = await res.json();
      tournaments = data.tournaments;
      document.getElementById('lastUpdated').textContent = 'Last updated: ' + data.lastUpdated;
    } catch (e) {
      // Fallback: fetch the embedded JSON directly
      try {
        const res = await fetch('/data/tournaments.json');
        const data = await res.json();
        tournaments = data.tournaments;
        document.getElementById('lastUpdated').textContent = 'Last updated: ' + data.lastUpdated;
      } catch (e2) {
        document.getElementById('lastUpdated').textContent = 'Using cached data';
      }
    }
    renderAll();
  }

  // ─────────────────────────────────────────────
  // FILTERS
  // ─────────────────────────────────────────────
  function getFiltered() {
    const state = document.getElementById('stateFilter').value;
    const tier = document.getElementById('tierFilter').value;
    return tournaments.filter(t =>
      (state === 'all' || t.state === state) &&
      (tier === 'all' || t.tier === tier)
    );
  }

  document.getElementById('stateFilter').addEventListener('change', renderAll);
  document.getElementById('tierFilter').addEventListener('change', renderAll);

  // ─────────────────────────────────────────────
  // STATS
  // ─────────────────────────────────────────────
  function renderStats() {
    const filtered = getFiltered();
    const s = filtered.filter(t => t.tier === 'S').length;
    const a = filtered.filter(t => t.tier === 'A').length;
    const b = filtered.filter(t => t.tier === 'B').length;
    document.getElementById('statsBar').innerHTML = `
      <div class="stat"><span class="stat-num">${filtered.length}</span><span class="stat-label">Total Tournaments</span></div>
      <div class="stat stat-s"><span class="stat-num">${s}</span><span class="stat-label">Tier S · Elite</span></div>
      <div class="stat stat-a"><span class="stat-num">${a}</span><span class="stat-label">Tier A · Premium</span></div>
      <div class="stat stat-b"><span class="stat-num">${b}</span><span class="stat-label">Tier B · Community</span></div>
    `;
  }

  // ─────────────────────────────────────────────
  // CALENDAR VIEW
  // ─────────────────────────────────────────────
  function renderCalendar() {
    const filtered = getFiltered();
    const title = MONTHS[currentMonth] + ' ' + currentYear;
    document.getElementById('monthTitle').textContent = title;

    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const today = new Date();

    // Group events by day
    const eventsByDay = {};
    filtered.forEach(t => {
      const d = new Date(t.startDate + 'T12:00:00');
      if (d.getFullYear() === currentYear && d.getMonth() === currentMonth) {
        const day = d.getDate();
        if (!eventsByDay[day]) eventsByDay[day] = [];
        eventsByDay[day].push(t);
      }
    });

    let html = DAYS.map(d => `<div class="day-header">${d}</div>`).join('');

    // Empty cells before first day
    for (let i = 0; i < firstDay; i++) {
      html += `<div class="day-cell empty"></div>`;
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const isToday = today.getFullYear() === currentYear &&
                      today.getMonth() === currentMonth &&
                      today.getDate() === day;
      const events = eventsByDay[day] || [];
      const MAX_VISIBLE = 3;

      let eventsHtml = events.slice(0, MAX_VISIBLE).map(t => `
        <div class="event-pill tier-${t.tier}" onclick="openModal('${t.id}')" title="${t.name}">
          <div class="dot"></div>
          <span>${t.name}</span>
        </div>
      `).join('');

      if (events.length > MAX_VISIBLE) {
        eventsHtml += `<div class="more-events" onclick="openMoreEvents(${day})">+${events.length - MAX_VISIBLE} more</div>`;
      }

      html += `
        <div class="day-cell ${isToday ? 'today' : ''}">
          <div class="day-num">${day}</div>
          ${eventsHtml}
        </div>
      `;
    }

    document.getElementById('calendarGrid').innerHTML = html;
  }

  function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    renderCalendar();
  }

  // ─────────────────────────────────────────────
  // LIST VIEW
  // ─────────────────────────────────────────────
  function renderList() {
    const filtered = getFiltered();

    if (filtered.length === 0) {
      document.getElementById('listContent').innerHTML = `
        <div class="empty-state">
          <div class="icon">⛳</div>
          <h3>No tournaments found</h3>
          <p>Try adjusting your filters.</p>
        </div>
      `;
      return;
    }

    // Sort by date
    const sorted = [...filtered].sort((a, b) => new Date(a.startDate) - new Date(b.startDate));

    // Group by month
    const groups = {};
    sorted.forEach(t => {
      const d = new Date(t.startDate + 'T12:00:00');
      const key = d.getFullYear() + '-' + d.getMonth();
      const label = MONTHS[d.getMonth()] + ' ' + d.getFullYear();
      if (!groups[key]) groups[key] = { label, events: [] };
      groups[key].events.push(t);
    });

    let html = '';
    Object.values(groups).forEach(g => {
      html += `<div class="list-month-group">
        <div class="list-month-title">${g.label}</div>`;
      g.events.forEach(t => {
        const d = new Date(t.startDate + 'T12:00:00');
        html += `
          <div class="list-event-card" onclick="openModal('${t.id}')">
            <div class="list-date-block">
              <div class="list-date-day">${d.getDate()}</div>
              <div class="list-date-month">${MONTHS[d.getMonth()].slice(0,3)}</div>
            </div>
            <div class="list-event-info">
              <div class="list-event-name">${t.name}</div>
              <div class="list-event-meta">
                <span>📍 ${t.city}, ${t.state}</span>
                <span>🏌️ ${t.venue}</span>
                <span>🏷️ ${t.type}</span>
              </div>
            </div>
            <div class="list-tier">
              <span class="tier-pill tier-${t.tier}">TIER ${t.tier}</span>
            </div>
          </div>`;
      });
      html += `</div>`;
    });

    document.getElementById('listContent').innerHTML = html;
  }

  // ─────────────────────────────────────────────
  // VIEW SWITCHER
  // ─────────────────────────────────────────────
  function setView(view) {
    currentView = view;
    document.getElementById('calendarView').className = 'calendar-view' + (view === 'calendar' ? '' : ' hidden');
    document.getElementById('listView').className = 'list-view' + (view === 'list' ? ' active' : '');
    document.getElementById('calBtn').className = 'view-btn' + (view === 'calendar' ? ' active' : '');
    document.getElementById('listBtn').className = 'view-btn' + (view === 'list' ? ' active' : '');
    renderAll();
  }

  // ─────────────────────────────────────────────
  // MODAL
  // ─────────────────────────────────────────────
  function openModal(id) {
    const t = tournaments.find(x => x.id === id);
    if (!t) return;

    const startD = new Date(t.startDate + 'T12:00:00');
    const endD = t.endDate && t.endDate !== t.startDate ? new Date(t.endDate + 'T12:00:00') : null;

    const dateStr = endD
      ? `${MONTHS[startD.getMonth()]} ${startD.getDate()} – ${endD.getDate()}, ${startD.getFullYear()}`
      : `${MONTHS[startD.getMonth()]} ${startD.getDate()}, ${startD.getFullYear()}`;

    const tierLabels = { S: 'Elite · Tier S', A: 'Premium · Tier A', B: 'Community · Tier B' };

    const rsvpBtn = t.rsvpUrl
      ? `<a href="${t.rsvpUrl}" target="_blank" class="btn-rsvp">🎟️ RSVP / Register</a>`
      : `<span class="btn-rsvp disabled">🎟️ RSVP TBD</span>`;

    const sourceBtn = t.source
      ? `<a href="${t.source}" target="_blank" class="btn-source">🔗 View Source</a>`
      : '';

    document.getElementById('modalContent').innerHTML = `
      <div class="modal-tier"><span class="tier-pill tier-${t.tier}">${tierLabels[t.tier]}</span></div>
      <div class="modal-name">${t.name}</div>
      <div class="modal-venue">📍 ${t.venue} · ${t.city}, ${t.state}</div>
      <div class="modal-details">
        <div class="modal-detail">
          <div class="modal-detail-label">Date</div>
          <div class="modal-detail-value">${dateStr}</div>
        </div>
        <div class="modal-detail">
          <div class="modal-detail-label">State</div>
          <div class="modal-detail-value">${t.state}</div>
        </div>
        <div class="modal-detail">
          <div class="modal-detail-label">Type</div>
          <div class="modal-detail-value">${t.type}</div>
        </div>
        <div class="modal-detail">
          <div class="modal-detail-label">Tier</div>
          <div class="modal-detail-value">Tier ${t.tier}</div>
        </div>
      </div>
      <div class="modal-desc">${t.description}</div>
      <div class="modal-actions">${rsvpBtn}${sourceBtn}</div>
    `;

    document.getElementById('modalOverlay').classList.add('active');
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
  }
  function closeModalDirect() {
    document.getElementById('modalOverlay').classList.remove('active');
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

  // ─────────────────────────────────────────────
  // RENDER ALL
  // ─────────────────────────────────────────────
  function renderAll() {
    renderStats();
    if (currentView === 'calendar') renderCalendar();
    else renderList();
  }

  // INIT
  loadData();
</script>
</body>
</html>
